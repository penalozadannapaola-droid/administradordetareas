<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Logros - Historial de Entregas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* Fondo Slate 900 */
            color: #f8fafc;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Título Principal con línea de acento */
        .titulo-seccion {
            color: #f8fafc;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 20px 0 30px;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Botón Guardar Superior Estilizado */
        .boton-guardar {
            position: absolute;
            top: 35px;
            right: 40px;
            padding: 10px 24px;
            background-color: #38bdf8; /* Azul Neón */
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.2);
            transition: background-color 0.2s, transform 0.1s;
        }

        .boton-guardar:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }

        /* Contenedor responsivo para la tabla */
        .tabla-wrapper {
            width: 100%;
            max-width: 750px;
            overflow-x: auto;
            border: 1px solid #334155;
            border-radius: 12px;
            background-color: #1e293b; /* Slate 800 */
            margin-bottom: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Estilos de la tabla de logros */
        .tabla-logros {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .tabla-logros th {
            background-color: #1e293b;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 14px 12px;
            text-align: left;
            border-bottom: 2px solid #334155;
        }

        .tabla-logros th:last-child {
            text-align: center;
        }

        .tabla-logros td {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 14px 12px;
            border-bottom: 1px solid #334155;
            font-size: 0.95rem;
            outline: none;
            transition: background-color 0.15s;
        }

        /* Foco al editar una celda */
        .tabla-logros td[contenteditable="true"]:focus {
            background-color: #1e293b;
            color: #38bdf8;
        }

        /* Celda de verificación centralizada */
        .celda-check {
            text-align: center;
            vertical-align: middle;
        }

        /* Checkbox interactivo estilo tecnológico */
        .check-completado {
            width: 20px;
            height: 20px;
            border: 2px solid #475569;
            border-radius: 6px;
            display: inline-block;
            cursor: pointer;
            position: relative;
            background-color: #0f172a;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .check-completado:hover {
            border-color: #38bdf8;
        }

        /* Estado activo con check de clip-path */
        .check-completado.activo {
            background-color: #38bdf8;
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .check-completado.activo::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 6px;
            height: 10px;
            border: solid #0f172a;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        /* Botón Inferior para Volver */
        .boton-volver {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 10px;
        }

        .boton-volver p {
            font-size: 0.9rem;
            font-weight: 500;
            color: #94a3b8;
            margin: 0;
            transition: color 0.2s;
        }

        .boton-volver:hover p {
            color: #38bdf8;
        }

        .icono-casa {
            width: 48px;
            height: 48px;
            background-color: #334155;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #475569;
            transition: background-color 0.2s, transform 0.2s;
        }

        .boton-volver:hover .icono-casa {
            background-color: #475569;
            transform: translateY(-2px);
        }

        .icono-casa::before {
            content: '';
            width: 20px;
            height: 20px;
            background-color: #38bdf8;
            clip-path: polygon(0% 60%, 15% 60%, 15% 100%, 85% 100%, 85% 60%, 100% 60%, 50% 0%);
        }

        /* Alerta flotante moderna para feedback */
        .toast-notificacion {
            position: fixed;
            bottom: 24px;
            background-color: #22c55e;
            color: #0f172a;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 768px) {
            .boton-guardar {
                position: static;
                margin-bottom: 20px;
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

    <h1 class="titulo-seccion">Mis Logros</h1>
    <button class="boton-guardar" onclick="guardarDatos()">Guardar</button>

    <div class="tabla-wrapper">
        <table class="tabla-logros" id="tablaLogros">
            <thead>
                <tr>
                    <th>Fecha de entrega</th>
                    <th>Asignatura</th>
                    <th>Tarea</th>
                    <th style="text-align: center;">Completado</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
                <tr>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td class="celda-check"><div class="check-completado" onclick="this.classList.toggle('activo')"></div></td>
                </tr>
            </tbody>
        </table>
    </div>

    <button class="boton-volver" onclick="window.location.href='inicio.html'">
        <p>Volver al Inicio</p>
        <div class="icono-casa"></div>
    </button>

    <div class="toast-notificacion" id="toastNotificacion">¡Logros guardados correctamente!</div>

    <script>
        function guardarDatos() {
            const filas = document.querySelectorAll('#tablaLogros tbody tr');
            const datos = [];
            const toast = document.getElementById('toastNotificacion');
            
            filas.forEach(fila => {
                const celdas = fila.querySelectorAll('td');
                datos.push({
                    fecha: celdas[0].textContent,
                    asignatura: celdas[1].textContent,
                    tarea: celdas[2].textContent,
                    completado: celdas[3].querySelector('.check-completado').classList.contains('activo')
                });
            });

            localStorage.setItem('logrosDatos', JSON.stringify(datos));
            
            // Animación del toast de confirmación
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        window.onload = function() {
            const datosGuardados = localStorage.getItem('logrosDatos');
            if (datosGuardados) {
                const datos = JSON.parse(datosGuardados);
                const filas = document.querySelectorAll('#tablaLogros tbody tr');
                
                datos.forEach((dato, indice) => {
                    if (filas[indice]) {
                        const celdas = filas[indice].querySelectorAll('td');
                        celdas[0].textContent = dato.fecha;
                        celdas[1].textContent = dato.asignatura;
                        celdas[2].textContent = dato.tarea;
                        if (dato.completado) {
                            celdas[3].querySelector('.check-completado').classList.add('activo');
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
